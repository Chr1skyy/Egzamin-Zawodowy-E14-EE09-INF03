<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Galeria</title>
    <link rel="stylesheet" href="styl2.css">
</head>

<body>
    <header>
        <h1>Galeria obrazów</h1>
    </header>
    <main>
        <section id="panelLewy">
            <img src="img/zdjecie.jpg" alt="zdjęcie dnia" />
            <h3>Zdjęcia opublikowali</h3>
            <table>
                <tr>
                    <td>Anna Porada</td>
                    <td>10 zdjęc</td>
                </tr>
                <tr>
                    <td>Krzysztof Wasilewski</td>
                    <td>12 zdjęc</td>
                </tr>
                <tr>
                    <td>Monika Kowalska</td>
                    <td>4 zdjęcia</td>
                </tr>
            </table>
        </section>
        <section id="panelPrawy">
            <div id="galeria">
                <button type="button" onclick="prev()">prev</button>
                <img id="glowne" src="img/1.jpg" alt="galeria" />
                <button type="button" onclick="next()">next</button>
            </div>
            <hr />
                <img src="img/1.jpg" alt="miniatura" onclick="zamiana('img/1.jpg',1)" />
                <img src="img/2.jpg" alt="miniatura" onclick="zamiana('img/2.jpg',2)" />
                <img src="img/3.jpg" alt="miniatura" onclick="zamiana('img/3.jpg',3)" />
                <img src="img/4.jpg" alt="miniatura" onclick="zamiana('img/4.jpg',4)" />
                <img src="img/5.jpg" alt="miniatura" onclick="zamiana('img/5.jpg',5)" />
        </section>
    </main>
    <footer>
        <a href="https://pixabay.com" target="_blank">Więcej obrazów</a>
        <p>Galerię wykonał: Chr1skyy</p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
