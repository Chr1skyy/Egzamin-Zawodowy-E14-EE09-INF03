<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Pola figur</title>
    <link rel="stylesheet" href="styl.css">
</head>

<body>
    <header>
        <h2>Pola figur płaskich</h2>
    </header>
    <main>
        <nav>
            <h3>MENU</h3>
            <ul>
                <li><a href="index.html">Prostokąt i trójkąt</a></li>
                <li><a href="kolo.html">Okrąg i koło</a></li>
            </ul>
        </nav>
        <section>
            <img src="1d.bmp" alt="Figura" id="choiceImg"><br>
            <img src="1m.bmp" alt="Wybierz trójkąt" class="choiceImg" onclick="choiceImg('1m.bmp')">
            <img src="2m.bmp" alt="Wybierz prostokąt" class="choiceImg" onclick="choiceImg('2m.bmp')">
        </section>
        <aside>
            <h3>Pole prostokąta / pole trójkąta:</h3><br>
            <label for="valueA">Bok prostokąta / podstawa trójkąta:</label><br>
            <input type="text" name="valueA" id="valueA"><br>
            <label for="valueB">Drugi bok prostokąta / wysokość trójkąta:</label><br>
            <input type="text" name="valueB" id="valueB"><br>
            <input type="button" value="Oblicz" onclick="calculate()">
            <p id="result"></p>
        </aside>
    </main>
    <footer>
        <p>Autor: Chr1skyy</p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
