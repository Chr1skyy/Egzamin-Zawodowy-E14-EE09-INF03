<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Biuro turystyczne</title>
    <link rel="stylesheet" href="styl.css">
</head>

<body>
    <header>
        <h2>Rezerwacje wycieczek</h2>
    </header>
    <main>
        <div class="container-row">
            <div id="container-column">
                <nav>
                    <button type="button" id="uczestnikBtn" onclick="zmienSekcje('uczestnik')">Uczestnik</button>
                    <button type="button" id="rezerwacjaBtn" onclick="zmienSekcje('rezerwacja')">Rezerwacja</button>
                </nav>
                <div class="container-row">
                    <section>
                        <h2>Dane Klienta</h2>
                        <img src="img/osoba.png" alt="Klient">
                        <br>
                        <label for="imie">Imię</label>
                        <input type="text" id="imie">
                        <br>
                        <label for="nazwisko">Nazwisko</label>
                        <input type="text" id="nazwisko">
                        <p><a href="wycieczki.html">Do strony głównej</a></p>
                    </section>
                    <section>
                        <h2>Dane rezerwacji</h2>
                        <span onclick="poprzedniaWycieczka()">&laquo;</span>
                        <img src="img/1.jpg" alt="wycieczka" id="zdjecieMiejsca">
                        <span onclick="nastepnaWycieczka()">&raquo;</span>
                        <h4 id="miejsceWycieczki">Barcelona</h4>
                        <label for="liczbaOsob">Liczba osób:</label>
                        <input type="number" id="liczbaOsob" min="1" max="4" value="2" disabled>
                        <br>
                        <label for="miejsceWylotu">Miejsce wylotu</label>
                        <select id="miejsceWylotu" disabled>
                            <option value="Warszawa">Warszawa</option>
                            <option value="Kraków">Kraków</option>
                            <option value="Wrocław">Wrocław</option>
                        </select>
                        <br>
                        <input type="radio" name="wyzywienie" id="sniadania" disabled>
                        <label for="sniadania">Śniadania</label>
                        <input type="radio" name="wyzywienie" id="sniadaniaObiadokolacje" disabled>
                        <label for="sniadaniaObiadokolacje">Śniadania i obiadokolacje</label>
                        <input type="radio" name="wyzywienie" id="AllInclusive" disabled>
                        <label for="wyzywienie">All inclusive</label>
                        <button type="button">Sprawdź cenę</button>
                    </section>
                </div>
            </div>
            <aside>
                <img src="img/1.jpg" alt="wycieczki">
                <img src="img/2.jpg" alt="wycieczki">
                <img src="img/3.jpg" alt="wycieczki">
                <img src="img/1.jpg" alt="wycieczki">
                <img src="img/2.jpg" alt="wycieczki">
                <img src="img/3.jpg" alt="wycieczki">
                <img src="img/1.jpg" alt="wycieczki">
                <img src="img/2.jpg" alt="wycieczki">
                <img src="img/3.jpg" alt="wycieczki">
            </aside>
        </div>
    </main>
    <footer>
        <p>Autor strony: <em>Chr1skyy</em></p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
